services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kova
      POSTGRES_PASSWORD: kova
      POSTGRES_DB: kova
    ports:
      - "5433:5432"
    volumes:
      - kova-db:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kova"]
      interval: 3s
      timeout: 3s
      retries: 15

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://kova:kova@db:5432/kova?sslmode=disable
      KOVA_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  kova-db:
