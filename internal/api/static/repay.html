<!doctype html>
<html lang="en">
 <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kova — repay your loan</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link
   rel="stylesheet"
   href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600&f[]=satoshi@400,500,700&display=swap"
  />
  <style>
   :root {
    --bg: #08080a;
    --surface: #0d0d0f;
    --surface-2: #141418;
    --line: #26262e;
    --line-soft: #1c1c22;
    --ink: #f6f6f7;
    --muted: #9a9aa4;
    --faint: #6b6b74;
    --accent: #8b7cff;
    --accent-ink: #ffffff;
    --display:
     'General Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --sans:
     'Satoshi', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto,
     sans-serif;
   }
   * {
    box-sizing: border-box;
   }
   body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font: 16px/1.6 var(--sans);
    -webkit-font-smoothing: antialiased;
   }
   body::before {
    content: '';
    position: fixed;
    inset: 0 0 auto 0;
    height: 340px;
    background: radial-gradient(
     90% 100% at 50% 0%,
     color-mix(in srgb, var(--accent) 12%, transparent),
     transparent 70%
    );
    pointer-events: none;
    z-index: 0;
   }
   header {
    position: relative;
    z-index: 1;
    border-bottom: 1px solid var(--line-soft);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: blur(12px);
   }
   .bar {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 11px;
   }
   .logo {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: var(--accent);
    color: var(--accent-ink);
    display: grid;
    place-items: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    flex: none;
   }
   .brand-name {
    font-weight: 600;
    font-size: 15.5px;
    letter-spacing: -0.01em;
   }
   .secure {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--faint);
   }
   main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 46px 22px 60px;
   }
   .card {
    max-width: 440px;
    width: 100%;
   }
   h1 {
    font-family: var(--display);
    font-size: 30px;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
    line-height: 1.15;
   }
   p.sub {
    color: var(--muted);
    margin: 0 0 26px;
    font-size: 15.5px;
    line-height: 1.55;
   }
   .strong {
    color: var(--ink);
    font-weight: 500;
   }
   .amount {
    background: linear-gradient(
     180deg,
     color-mix(in srgb, var(--accent) 10%, var(--surface)),
     var(--surface)
    );
    border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--line));
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 24px;
   }
   .amount .label {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
   }
   .amount .amt {
    font-family: var(--display);
    font-size: 44px;
    font-weight: 300;
    letter-spacing: -0.03em;
    margin-top: 6px;
    line-height: 1;
   }
   .amount .due {
    color: var(--muted);
    font-size: 13.5px;
    margin-top: 12px;
   }
   .amount .due b {
    color: var(--ink);
    font-weight: 500;
   }
   button.primary {
    width: 100%;
    background: var(--accent);
    color: var(--accent-ink);
    border: 0;
    border-radius: 12px;
    padding: 15px;
    font-size: 15.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
   }
   button.primary:hover {
    opacity: 0.92;
   }
   button.primary:disabled {
    opacity: 0.45;
    cursor: default;
   }
   .center {
    text-align: center;
    padding: 22px 0;
   }
   .badge {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    margin: 0 auto 20px;
    background: color-mix(in srgb, var(--accent) 14%, transparent);
   }
   .err {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    border-radius: 11px;
    padding: 11px 14px;
    font-size: 14px;
    margin-bottom: 16px;
   }
   .legal {
    font-size: 12.5px;
    color: var(--faint);
    margin-top: 14px;
    text-align: center;
   }
   .upsell {
    margin-top: 28px;
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    background: radial-gradient(
     130% 120% at 50% 0%,
     color-mix(in srgb, var(--accent) 11%, var(--surface)),
     var(--surface)
    );
   }
   .upsell .k {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
   }
   .upsell .k .dot {
    width: 15px;
    height: 15px;
    border-radius: 5px;
    display: inline-grid;
    place-items: center;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 10px;
    font-weight: 800;
   }
   .upsell .t {
    font-size: 16.5px;
    font-weight: 600;
    margin: 10px 0 4px;
    color: var(--ink);
    letter-spacing: -0.01em;
   }
   .upsell .d {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--muted);
    margin: 0 auto 16px;
    max-width: 34ch;
   }
   .upsell a {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: var(--accent-ink);
    text-decoration: none;
    padding: 11px 20px;
    border-radius: 11px;
    font-size: 14px;
    font-weight: 600;
    transition: opacity 0.15s;
   }
   .upsell a:hover {
    opacity: 0.9;
   }
   footer {
    position: relative;
    z-index: 1;
    text-align: center;
    color: var(--faint);
    font-size: 12.5px;
    padding: 24px;
   }
   .spin {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid color-mix(in srgb, var(--accent-ink) 40%, transparent);
    border-top-color: var(--accent-ink);
    display: inline-block;
    vertical-align: -3px;
    margin-right: 8px;
    animation: rot 0.7s linear infinite;
   }
   @keyframes rot {
    to {
     transform: rotate(360deg);
    }
   }
   .sk {
    background: linear-gradient(
     90deg,
     var(--surface) 25%,
     var(--surface-2) 50%,
     var(--surface) 75%
    );
    background-size: 200% 100%;
    border-radius: 8px;
    animation: shimmer 1.3s ease-in-out infinite;
   }
   @keyframes shimmer {
    to {
     background-position: -200% 0;
    }
   }
  </style>
 </head>
 <body>
  <header>
   <div class="bar">
    <span class="logo" id="logo">K</span>
    <span class="brand-name" id="brand">Kova</span>
    <span class="secure">
     <svg
      width="13"
      height="13"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
     >
      <rect x="3" y="11" width="18" height="11" rx="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
     </svg>
     Secure
    </span>
   </div>
  </header>
  <main>
   <div class="card" id="root">
    <div class="sk" style="height: 30px; width: 70%; margin-bottom: 14px"></div>
    <div
     class="sk"
     style="height: 16px; width: 100%; margin-bottom: 26px"
    ></div>
    <div
     class="sk"
     style="
      height: 120px;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 18px;
     "
    ></div>
    <div class="sk" style="height: 52px; width: 100%"></div>
   </div>
  </main>
  <footer>Secured by Kova · payments processed by Monnify</footer>

  <script>
   const ID = '__REQUEST_ID__';
   const API = location.origin;
   const KOVA_SITE = ('__KOVA_SITE__' || '/').replace(/\/$/, '');
   const root = document.getElementById('root');
   let state = {};

   const naira = (kobo) =>
    '₦' + Math.round((Number(kobo) || 0) / 100).toLocaleString('en-NG');
   const esc = (s) =>
    (s || '').replace(
     /[&<>"]/g,
     (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c],
    );
   const brandName = () => (state.brand && state.brand.name) || 'your lender';
   const dueAmount = () => state.repaymentTotal || state.offerAmount || 0;

   async function load() {
    try {
     const r = await fetch(`${API}/v1/requests/${ID}`);
     if (!r.ok) return fail('This repayment link is invalid or has expired.');
     state = await r.json();
    } catch {
     return fail('Could not load this repayment. Please try again.');
    }
    const b = state.brand || {};
    const isHex = (v) => v && /^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v);
    if (isHex(b.color)) {
     document.documentElement.style.setProperty('--accent', b.color);
     document.documentElement.style.setProperty(
      '--accent-ink',
      isHex(b.textColor) ? b.textColor : '#ffffff',
     );
    }
    if (b.name) {
     document.getElementById('brand').textContent = b.name;
     document.getElementById('logo').textContent = b.name.trim()[0] || 'K';
     document.title = b.name + ' — repay your loan';
    }

    if (state.repaid) return repaidView();
    if (!state.disbursed)
     return fail('There is nothing to repay on this link yet.');
    renderPay();
   }

   function renderPay() {
    const due = state.repaymentDueAt
     ? new Date(state.repaymentDueAt).toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
       })
     : '';
    root.innerHTML = `
     <h1>Repay your loan</h1>
     <p class="sub">Repay <span class="strong">${esc(brandName())}</span> securely. You'll be taken to Monnify to complete the payment.</p>
     <div id="err"></div>
     <div class="amount">
      <div class="label">Amount due</div>
      <div class="amt">${naira(dueAmount())}</div>
      ${due ? `<div class="due">Due <b>${due}</b></div>` : ''}
     </div>
     <button class="primary" id="go">Pay ${naira(dueAmount())} securely</button>
     <p class="legal">Payments are processed by Monnify. Your card and bank details never touch ${esc(brandName())}.</p>`;
    document.getElementById('go').onclick = pay;
   }

   async function pay() {
    const btn = document.getElementById('go');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Starting secure payment…';
    try {
     const r = await fetch(`${API}/v1/requests/${ID}/repay-init`, {
      method: 'POST',
     });
     const d = await r.json();
     if (!r.ok || !d.checkoutUrl) {
      btn.disabled = false;
      btn.textContent = `Pay ${naira(dueAmount())} securely`;
      return showErr(
       d.error || 'Could not start the payment. Please try again.',
      );
     }
     location.href = d.checkoutUrl;
    } catch {
     btn.disabled = false;
     btn.textContent = `Pay ${naira(dueAmount())} securely`;
     showErr('Network error. Please try again.');
    }
   }

   function repaidView() {
    root.innerHTML = `<div class="center">
     <div class="badge"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
     <h1>Repayment received</h1>
     <p class="sub">Thank you — your loan with ${esc(brandName())} is fully repaid. A receipt is on its way if email is enabled.</p>
    </div>${upsell()}`;
   }

   function upsell() {
    return `
     <div class="upsell">
      <div class="k"><span class="dot">K</span> Powered by Kova</div>
      <div class="t">Lend with confidence, on any bank statement</div>
      <div class="d">Kova turns raw bank statements into instant credit scores and a full lend-and-collect loop for your business.</div>
      <a href="${KOVA_SITE}/" target="_blank" rel="noopener">See how Kova works
       <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
     </div>`;
   }

   function fail(msg) {
    root.innerHTML = `<div class="center">
     <div class="badge"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5v.5"/></svg></div>
     <h1>Unavailable</h1>
     <p class="sub">${msg}</p>
    </div>${upsell()}`;
   }
   function showErr(msg) {
    const e = document.getElementById('err');
    if (e) e.innerHTML = `<div class="err">${esc(msg)}</div>`;
   }

   load();
  </script>
 </body>
</html>
